<div class="task-item" [class.completed]="task().completed" [class.editing]="isEditing()">
  <label class="checkbox-wrapper" [attr.aria-label]="'Mark ' + task().title + ' as ' + (task().completed ? 'pending' : 'completed')">
    <input
      type="checkbox"
      class="checkbox"
      [checked]="task().completed"
      (change)="toggled.emit(task().id)"
    />
    <span class="checkmark"></span>
  </label>

  @if (isEditing()) {
    <input
      #editInput
      type="text"
      class="edit-input"
      [ngModel]="editTitle()"
      (ngModelChange)="editTitle.set($event)"
      (keydown)="onEditKeydown($event)"
      (blur)="saveEdit()"
      maxlength="200"
      aria-label="Edit task title"
    />
  } @else {
    <span class="task-title" (dblclick)="startEdit()">{{ task().title }}</span>
  }

  <div class="actions">
    @if (!isEditing()) {
      <button
        class="action-btn edit-btn"
        (click)="startEdit()"
        title="Edit task"
        aria-label="Edit task"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
      <button
        class="action-btn delete-btn"
        (click)="deleted.emit(task().id)"
        title="Delete task"
        aria-label="Delete task"
      >
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>
    } @else {
      <button class="action-btn save-btn" (click)="saveEdit()" title="Save" aria-label="Save edit">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
      <button class="action-btn cancel-btn" (click)="cancelEdit()" title="Cancel" aria-label="Cancel edit">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    }
  </div>
</div>
